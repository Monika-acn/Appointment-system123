apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appointment-v2
  template:
    metadata:
      labels:
        app: appointment-v2
    spec:
      containers:
      - name: appointment-container
        image: monikaraju/appointment-v2:latest
        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service-v2
spec:
  type: NodePort
  selector:
    app: appointment-v2
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30002
