apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-v3
  labels:
    app: appointment-v3
    version: v3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appointment-v3
  template:
    metadata:
      labels:
        app: appointment-v3
    spec:
      containers:
      - name: appointment-container
        image: monikaraju/appointment-v3:v3     # ← change monikaraju to your DockerHub username
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service-v3
spec:
  type: NodePort
  selector:
    app: appointment-v3
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30003        # Access via http://localhost:30003
