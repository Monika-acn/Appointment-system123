apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appointment-v1
  template:
    metadata:
      labels:
        app: appointment-v1
    spec:
      containers:
      - name: appointment-container
        image: yourdockerhub/appointment-v1:latest
        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service-v1
spec:
  type: NodePort
  selector:
    app: appointment-v1
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30001
